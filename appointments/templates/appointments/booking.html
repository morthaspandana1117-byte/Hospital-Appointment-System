{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Book Appointment</title>
    <link rel="stylesheet" href="{% static 'appointments/css/styles.css' %}">
    <link rel="stylesheet" href="{% static 'appointments/css/styles_profile.css' %}">
</head>
<body>

<div class="container">
    <div class="form-card">
        <h2>Book Appointment</h2>

        {% if error %}
            <p style="color:#ffe0e0; margin-bottom: 16px;">{{ error }}</p>
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <input type="text" name="name" placeholder="Patient Name" value="{{ form_data.name|default:'' }}" required>
            <input type="number" name="age" placeholder="Age" value="{{ form_data.age|default:'' }}" required>

            <textarea name="problem" placeholder="Describe your problem" required>{{ form_data.problem|default:'' }}</textarea>

            <input type="date" name="date" min="{{ today }}" value="{{ form_data.date|default:today }}" required>

            <label for="priority">Priority</label>
            <select name="priority" id="priority">
                <option value="Normal" {% if form_data.priority|default:"Normal" == "Normal" %}selected{% endif %}>Normal</option>
                <option value="Emergency" {% if form_data.priority == "Emergency" %}selected{% endif %}>Emergency</option>
            </select>

            <button class="btn btn-primary" type="submit">
                Book Appointment
            </button>
        </form>

        <br>

        <a href="{% url 'patient-dashboard' %}">
            <button class="btn btn-danger">Back to Dashboard</button>
        </a>
    </div>
</div>

</body>
</html>

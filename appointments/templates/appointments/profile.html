{% load static %}
<!DOCTYPE html>
<html>
<head>
  <title>My Profile</title>
  <link rel="stylesheet" href="{% static 'appointments/css/styles.css' %}">
</head>
<body>

<div class="container">
  <h2>My Profile</h2>

  <div class="form-card">
    <form method="POST">
      {% csrf_token %}

      <input type="text" value="{{ request.user.username }}" disabled>

      <input type="email" name="email" value="{{request.user.email}}" required>

      <input type="password" name="password" placeholder="New Password">

      <button class="btn btn-primary" type="submit">
        Update Password
      </button>
    </form>
  </div>

  <br>

  <a href="{% url 'logout' %}">
    <button class="btn btn-danger">Logout</button>
  </a>
</div>

</body>
</html>
